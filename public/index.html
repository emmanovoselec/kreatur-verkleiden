<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kreatur-Verkleiden!</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <h1>Kreatur-Verkleiden!</h1>
    <p class="subtitle">Wähle ein Tier und verkleide es!</p>

    <div id="animal-picker"></div>

    <div id="main-area">
      <div id="stage">
        <svg id="creature-svg" viewBox="0 0 300 360" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="bodyGrad" cx="50%" cy="40%" r="55%">
              <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#000" stop-opacity="0.08"/>
            </radialGradient>
            <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ff9999" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#ff9999" stop-opacity="0"/>
            </radialGradient>
            <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
              <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
            </filter>
            <filter id="innerShadow">
              <feComponentTransfer in="SourceAlpha">
                <feFuncA type="table" tableValues="1 0"/>
              </feComponentTransfer>
              <feGaussianBlur stdDeviation="3"/>
              <feOffset dx="0" dy="2" result="offsetblur"/>
              <feFlood flood-color="#000" flood-opacity="0.15" result="color"/>
              <feComposite in2="offsetblur" operator="in"/>
              <feComposite in2="SourceAlpha" operator="in"/>
              <feMerge>
                <feMergeNode in="SourceGraphic"/>
                <feMergeNode/>
              </feMerge>
            </filter>
          </defs>

          <!-- Ground shadow -->
          <ellipse cx="150" cy="345" rx="80" ry="10" fill="rgba(0,0,0,0.08)"/>

          <!-- Animal layers (built by JS) -->
          <g id="layer-tail"></g>
          <g id="layer-body-back"></g>
          <g id="layer-legs"></g>
          <g id="layer-body"></g>
          <g id="layer-arms"></g>
          <g id="layer-outfit"></g>
          <g id="layer-head"></g>
          <g id="layer-ears"></g>
          <g id="layer-hat"></g>
          <g id="layer-face"></g>
          <g id="layer-eyewear"></g>
          <g id="layer-mouthwear"></g>
          <g id="layer-hand-item"></g>
          <g id="layer-shoes"></g>
        </svg>
        <div id="creature-name-display"></div>
      </div>

      <div id="items-panel">
        <div id="category-tabs">
          <button class="tab active" data-category="hat">Hüte</button>
          <button class="tab" data-category="eyes">Brillen</button>
          <button class="tab" data-category="mouth">Mund</button>
          <button class="tab" data-category="body">Outfit</button>
          <button class="tab" data-category="hand">Hand</button>
          <button class="tab" data-category="shoes">Schuhe</button>
        </div>
        <div id="items-grid"></div>
      </div>
    </div>

    <div id="actions">
      <button id="btn-random" class="action-btn">🎲 Zufall!</button>
      <button id="btn-clear" class="action-btn">🧹 Ausziehen</button>
      <button id="btn-name" class="action-btn">✏️ Name geben</button>
      <button id="btn-screenshot" class="action-btn">📸 Foto!</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
